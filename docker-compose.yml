version: "3.9"
services:
  worker:
    build: .
    volumes:
      - .:/code
      - logvolume01:/var/log
    links:
      - redis
    ports:
      - "3015:3015"
    environment:
      PORT: 3015
      OWNER_NAME: ${OWNER_NAME}
      BOTNAME: ${BOTNAME}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_ID: ${SESSION_ID}
      REMOVEBG_KEY: ${REMOVEBG_KEY}
      PREFIX: ${PREFIX}
  redis:
    image: redis
volumes:
  logvolume01: {}
  
